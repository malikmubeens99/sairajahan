<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saira Jahan Salon & Academy | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .premium-input { background: #F8F9FA; border: 1px solid #E9ECEF; transition: all 0.3s ease; }
        .premium-input:focus { border-color: #DFBA73; background: #FFFFFF; box-shadow: 0 0 0 4px rgba(223, 186, 115, 0.15); }
    </style>
</head>
<body class="text-[#1E1E24] bg-white font-sans">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="flex flex-col">
                <span class="text-xl font-bold tracking-[0.15em] text-[#1E1E24]">SAIRA JAHAN</span>
                <span class="text-[9px] uppercase tracking-[0.3em] text-gray-400 font-medium">Salon & Academy</span>
            </a>
            <div class="hidden md:flex items-center space-x-8 text-xs font-semibold uppercase tracking-wider text-gray-600">
                <a href="index.html" class="hover:text-[#DFBA73] transition">Home</a>
                <a href="about.html" class="hover:text-[#DFBA73] transition">About</a>
                <a href="courses.html" class="hover:text-[#DFBA73] transition">Courses</a>
                <a href="contact.html" class="hover:text-[#DFBA73] transition">Contact</a>
                <a href="appointment.html" class="text-[#DFBA73]">Book Admission</a>
            </div>
        </div>
    </nav>

    <section class="py-24 bg-white px-6">
        <div class="max-w-xl mx-auto bg-white p-8 md:p-10 rounded-3xl border border-gray-100 shadow-xl shadow-gray-100/50">
            <div class="text-center mb-8 space-y-1">
                <h2 class="text-2xl font-bold">Course Registration</h2>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Secure Your Academy Slot</p>
            </div>

            <div id="successAlert" class="hidden bg-emerald-50 border border-emerald-100 text-emerald-800 p-4 rounded-xl mb-6 text-center text-xs font-medium">
                🎉 Registration submitted successfully! We will contact you shortly.
            </div>

            <form id="appointmentForm" class="space-y-4 text-sm">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Full Name</label>
                    <input type="text" id="userName" required class="w-full p-3 rounded-xl premium-input focus:outline-none">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Email Address</label>
                        <input type="email" id="userEmail" required class="w-full p-3 rounded-xl premium-input focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Phone Number</label>
                        <input type="tel" id="userPhone" required class="w-full p-3 rounded-xl premium-input focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Select Program</label>
                    <select id="userCourse" required class="w-full p-3 rounded-xl premium-input bg-white focus:outline-none cursor-pointer">
                        <option value="">-- Choose a Course Track --</option>
                        <option value="Professional Bridal Makeup">Professional Bridal Makeup</option>
                        <option value="Advanced Hair Artistry">Advanced Hair Artistry</option>
                        <option value="Aesthetic Skin Therapy">Aesthetic Skin Therapy</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Preferred Commencement Date</label>
                    <input type="date" id="userDate" required class="w-full p-3 rounded-xl premium-input focus:outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Special Queries / Notes</label>
                    <textarea id="userMessage" rows="3" class="w-full p-3 rounded-xl premium-input focus:outline-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-[#1E1E24] text-white font-bold py-4 rounded-xl hover:bg-[#DFBA73] hover:text-[#1E1E24] transition duration-300 text-xs uppercase tracking-widest pt-3">
                    Submit Registration Form
                </button>
            </form>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // Provided Live Firebase Configuration Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyDK4O8aDtNffQWik7vGP2-S24LQDHi25XY",
            authDomain: "sairajahan.firebaseapp.com",
            databaseURL: "https://sairajahan-default-rtdb.firebaseio.com",
            projectId: "sairajahan",
            storageBucket: "sairajahan.firebasestorage.app",
            messagingSenderId: "482025671453",
            appId: "1:482025671453:web:de80629c3c93e243f86ff4",
            measurementId: "G-97F1ZSHTYY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        const form = document.getElementById('appointmentForm');
        const alertBox = document.getElementById('successAlert');
        const submitBtn = document.getElementById('submitBtn');

        // Check if there's a course name passed via URL parameter
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const selectedCourse = params.get('course');
            if (selectedCourse) {
                document.getElementById('userCourse').value = selectedCourse;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.innerText = "Processing Data...";
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, "appointments"), {
                    name: document.getElementById('userName').value,
                    email: document.getElementById('userEmail').value,
                    phone: document.getElementById('userPhone').value,
                    course: document.getElementById('userCourse').value,
                    date: document.getElementById('userDate').value,
                    message: document.getElementById('userMessage').value,
                    createdAt: serverTimestamp()
                });

                alertBox.classList.remove('hidden');
                form.reset();
                setTimeout(() => { alertBox.classList.add('hidden'); }, 4000);

            } catch (error) {
                console.error("Critical Firestore Submission Error: ", error);
                alert("Database save fail hua. Please ensure firestore permissions are open.");
            } finally {
                submitBtn.innerText = "Submit Registration Form";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
